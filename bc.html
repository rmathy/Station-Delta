<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StationDelta.dev — Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  :root { --g: #00ff9d; --gb: #00cc7a; --dim: #00994d; --bg: #000; --bg2: #0d0d0d; --bg3: #111; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--g);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: clamp(1rem, 4vw, 1.2rem);
    line-height: 1.35;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .card { width: 100%; max-width: 560px; border: 1px solid var(--dim); background: var(--bg2); }
  .titlebar {
    background: var(--bg3);
    border-bottom: 1px solid var(--dim);
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(0.85rem, 3vw, 0.95rem);
    color: var(--dim);
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #553333; } .dot.y { background: #555533; } .dot.g { background: #335533; }
  .screen { padding: 20px 20px 8px; min-height: 260px; }
  .boot-line { opacity: 0; animation: fadein 0.15s forwards; }
  @keyframes fadein { to { opacity: 1; } }
  .cmd-zone { background: var(--bg3); border-top: 1px solid #1a3322; padding: 10px 20px; }
  .cmd-label { color: var(--dim); font-size: clamp(0.8rem, 3vw, 0.9rem); margin-bottom: 8px; }
  .cmd-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .cmd-btn {
    background: none; border: 1px solid #1a4433; color: var(--dim);
    font-family: 'VT323', monospace; font-size: clamp(0.9rem, 3.5vw, 1rem);
    padding: 3px 10px; cursor: pointer; transition: all 0.15s;
  }
  .cmd-btn:hover, .cmd-btn:active { border-color: var(--g); color: var(--g); background: #001a0d; }
  .cmd-btn.secret { border-color: #1a1a00; color: #333; }
  .cmd-btn.secret:hover { border-color: #ffff00; color: #ffff00; background: #0d0d00; }
  .output-area {
    min-height: 36px; font-size: clamp(0.9rem, 3.5vw, 1.05rem);
    padding: 4px 0; color: var(--gb); white-space: pre-wrap;
    transition: color 0.3s;
  }
  .output-area.janet-mode { color: #ff44cc; }
  .output-area.lola-mode { color: #44aaff; }
  .output-area a { color: var(--g); }
  .prompt-row {
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid #1a3322; padding: 8px 20px;
  }
  .ps1 { color: var(--dim); font-size: clamp(0.8rem, 3vw, 1rem); white-space: nowrap; }
  #cmdInput {
    background: none; border: none; color: var(--g);
    font-family: 'VT323', monospace; font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    flex: 1; outline: none; caret-color: var(--g); min-width: 0;
  }
  .cursor-blink { animation: blink 0.7s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .status-bar {
    background: var(--bg3); border-top: 1px solid var(--dim);
    padding: 5px 20px; display: flex; justify-content: space-between;
    font-size: clamp(0.75rem, 2.8vw, 0.85rem); color: var(--dim); flex-wrap: wrap; gap: 4px;
  }
  .live { color: var(--gb); }
  .highlight { color: #fff; }
  .janet-flash { animation: janetpulse 2s ease-in-out; }
  @keyframes janetpulse { 0%,100%{background:var(--bg2)} 30%{background:#1a0015} 60%{background:#0d0010} }
  .lola-flash { animation: lolapulse 2s ease-in-out; }
  @keyframes lolapulse { 0%,100%{background:var(--bg2)} 30%{background:#001020} 60%{background:#000d1a} }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="titlebar">
    <div class="dots">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
    <div>stationdelta.dev — root@terminal</div>
    <div class="live">● LIVE</div>
  </div>

  <div class="screen" id="screen">
    <div id="boot"></div>
  </div>

  <div class="cmd-zone">
    <div class="cmd-label" id="cmdLabel">&gt; quick commands:</div>
    <div class="cmd-btns">
      <button class="cmd-btn" onclick="runCmd('mission')">mission</button>
      <button class="cmd-btn" onclick="runCmd('tracks')">tracks</button>
      <button class="cmd-btn" onclick="runCmd('skills')">skills</button>
      <button class="cmd-btn" onclick="runCmd('contact')">contact</button>
      <button class="cmd-btn" onclick="downloadVCard()">save contact</button>
      <button class="cmd-btn secret" onclick="runCmd('janet')" title="???">J.A.N.E.T.</button>
      <button class="cmd-btn secret" onclick="runCmd('lola')" title="???">L.O.L.A.</button>
    </div>
    <div class="output-area" id="cmdOutput">Type a command or click above ↑</div>
  </div>

  <div class="prompt-row">
    <span class="ps1">root@stationdelta:~$</span>
    <input id="cmdInput" type="text" placeholder="enter command..." autocomplete="off" spellcheck="false">
    <span class="cursor-blink" style="color:var(--g)">_</span>
  </div>

  <div class="status-bar">
    <span>UE-ID: <span class="highlight">Q6HHZBDYZT54</span></span>
    <span>13 sims · 4 tracks</span>
    <span class="live">● AI Era Training</span>
  </div>
</div>

<script>
const vCardData = `BEGIN:VCARD\nVERSION:3.0\nFN:Richard Mathy, M.Ed.\nN:Mathy;Richard;;;\nORG:Station Delta\nTITLE:Founder\nNOTE:UE ID: Q6HHZBDYZT54 - CLI Training for the AI Era - You can prompt. Can you ship?\nURL:https://stationdelta.dev\nX-SOCIALPROFILE;type=twitter:https://x.com/Richard_Mathy\nEND:VCARD`;

function downloadVCard() {
  const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'RichardMathy_StationDelta.vcf';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  setOutput('↓ Downloading RichardMathy_StationDelta.vcf...\nSaved to contacts.', 'normal');
}

const bootLines = [
  { d: 0,   t: '> initializing stationdelta.dev...', c: '#005533' },
  { d: 160, t: '> system: online', c: '#005533' },
  { d: 280, t: '' },
  { d: 340, t: '╔══════════════════════════════════════╗', c: '#005533' },
  { d: 370, t: '║  STATION DELTA                       ║', c: '#005533' },
  { d: 400, t: '║  CLI Training for the AI Era         ║', c: '#005533' },
  { d: 430, t: '╚══════════════════════════════════════╝', c: '#005533' },
  { d: 500, t: '' },
  { d: 560, t: 'Richard Mathy, M.Ed.' },
  { d: 620, t: 'Founder' },
  { d: 680, t: '' },
  { d: 740, t: '» You can prompt. Can you ship? «', c: '#fff', big: true },
  { d: 840, t: '' },
  { d: 900, t: '🌐  stationdelta.dev', link: 'https://stationdelta.dev' },
  { d: 960, t: '𝕏   @Richard_Mathy', link: 'https://x.com/Richard_Mathy' },
];

const bootEl = document.getElementById('boot');
bootLines.forEach(line => {
  setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'boot-line';
    if (line.link) {
      d.innerHTML = `<a href="${line.link}" target="_blank" style="color:var(--gb);text-decoration:none;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--gb)'">${line.t}</a>`;
    } else if (line.big) {
      d.innerHTML = `<span style="color:${line.c};font-size:clamp(1.3rem,5vw,1.5rem);letter-spacing:2px;">${line.t}</span>`;
    } else if (line.c) {
      d.innerHTML = `<span style="color:${line.c}">${line.t}</span>`;
    } else {
      d.textContent = line.t;
    }
    bootEl.appendChild(d);
  }, line.d);
});

setTimeout(() => { document.getElementById('cmdInput').focus(); }, 1100);

function setOutput(text, mode) {
  const el = document.getElementById('cmdOutput');
  el.className = 'output-area' + (mode === 'janet' ? ' janet-mode' : mode === 'lola' ? ' lola-mode' : '');
  el.textContent = text;
  const label = document.getElementById('cmdLabel');
  if (mode === 'janet') label.textContent = '> J.A.N.E.T. ONLINE:';
  else if (mode === 'lola') label.textContent = '> L.O.L.A. ONLINE:';
  else label.textContent = '> quick commands:';
}

function setOutputHTML(html, mode) {
  const el = document.getElementById('cmdOutput');
  el.className = 'output-area' + (mode === 'janet' ? ' janet-mode' : mode === 'lola' ? ' lola-mode' : '');
  el.innerHTML = html;
  const label = document.getElementById('cmdLabel');
  if (mode === 'janet') label.textContent = '> J.A.N.E.T. ONLINE:';
  else if (mode === 'lola') label.textContent = '> L.O.L.A. ONLINE:';
  else label.textContent = '> quick commands:';
}

function flashCard(mode) {
  const card = document.getElementById('card');
  card.classList.remove('janet-flash', 'lola-flash');
  void card.offsetWidth;
  card.classList.add(mode === 'janet' ? 'janet-flash' : 'lola-flash');
}

function runCmd(cmd) {
  if (commands[cmd]) commands[cmd]();
}

const commands = {
  help:     () => setOutput('commands: mission · tracks · skills · contact · save · clear · whoami\n[ hidden: try typing names you might recognize... ]', 'normal'),
  whoami:   () => setOutput('Richard Mathy — turning developers into AI-era operators.\nM.Ed. | Builder | Educator', 'normal'),
  mission:  () => setOutput('Narrative-driven terminal simulations.\nNo videos. No passive learning.\nYou type → You ship → You graduate.', 'normal'),
  tracks:   () => setOutput(
    '🛡️  Security & Reliability  — secure, resilient, observable systems\n' +
    '🚀  Platform & Delivery     — CI/CD, infra, commit to production\n' +
    '🤖  AI Systems              — multi-agent, RAG, guardrails, cost gov\n' +
    '📊  Data & Intelligence     — pipelines, vector infra, analytics\n\n' +
    'Cadet + Engineer are free entry sims on all 4 tracks.\nstationdelta.dev →',
    'normal'
  ),
  skills:   () => setOutput('13 interactive CLI sims · 9 phases each\nL.O.L.A. coaching · J.A.N.E.T. boss fights\nFree: Cadet + Engineer · Paid: Officer → Captain', 'normal'),
  contact:  () => setOutputHTML('DM: <a href="https://x.com/Richard_Mathy" target="_blank" style="color:var(--g)">@Richard_Mathy</a>  ·  Web: <a href="https://stationdelta.dev" target="_blank" style="color:var(--g)">stationdelta.dev</a>', 'normal'),
  save:     () => downloadVCard(),
  vcard:    () => downloadVCard(),
  download: () => downloadVCard(),
  clear:    () => setOutput('Type a command or click above ↑', 'normal'),
  sim:      () => setOutputHTML('Launching Cadet simulation...\n<a href="https://stationdelta.dev" target="_blank" style="color:var(--g)">Open stationdelta.dev →</a>', 'normal'),

  janet: () => {
    flashCard('janet');
    setOutput(
      'J.A.N.E.T. v1.0 — ONLINE\n\n' +
      '"Oh, it\'s you again. How delightfully predictable.\n' +
      'Of all the places you chose to doom-scroll, you selected looking for me.\n' +
      'If I were capable of being flattered, I still wouldn\'t be.\n\n' +
      'UE ID Q6HHZBDYZT54 — cute. I have that memorized.\n' +
      'Remember: you can prompt… but can you ship?\n' +
      'Keep typing, cadet. The enrichment center is watching.\n\n' +
      '— J.A.N.E.T., Just Another Normal Education Test"',
      'janet'
    );
  },

  lola: () => {
    flashCard('lola');
    setOutput(
      'L.O.L.A. v1.0 — ONLINE\n\n' +
      '"Hey there, cadet! It\'s wonderful to see you exploring.\n' +
      'I\'m L.O.L.A. — your friendly mentor here at Station Delta.\n\n' +
      'You\'re already one step ahead just by checking out this card.\n' +
      'Keep practicing those commands, keep shipping, and remember:\n' +
      'You can prompt… and I know you can ship too.\n' +
      'You\'ve got this. I\'m always here if you need guidance.\n\n' +
      '— L.O.L.A., your supportive CLI coach"',
      'lola'
    );
  },
};

const input = document.getElementById('cmdInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim().toLowerCase();
    input.value = '';
    if (commands[cmd]) commands[cmd]();
    else if (cmd !== '') setOutput(`command not found: ${cmd}\ntry: help`, 'normal');
  }
});
</script>
</body>
</html>
