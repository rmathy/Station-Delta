<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StationDelta.dev — Terminal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    :root { --green: #00ff9d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0a;
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
      line-height: 1.3;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .terminal {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #000;
      border: 8px solid #222;
      box-shadow: 0 0 30px rgba(0, 255, 150, 0.3);
    }
    .header {
      background: #111;
      padding: 8px 15px;
      border-bottom: 4px solid var(--green);
      display: flex;
      justify-content: space-between;
      font-size: 1.3rem;
    }
    .prompt { display: flex; margin-bottom: 8px; }
    .prompt span { margin-right: 10px; }
    .output { margin-left: 30px; white-space: pre-wrap; }
    .link { color: var(--green); text-decoration: underline; cursor: pointer; }
    .link:hover { color: #fff; }
    .cursor { animation: blink 0.7s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .footer {
      padding: 12px;
      background: #111;
      text-align: center;
      font-size: 1.1rem;
      color: #0a0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>StationDelta.dev — root@terminal</div>
    <div>🟢 LIVE</div>
  </div>
  
  <div class="terminal" id="terminal">
    <div id="lines"></div>
  </div>
  
  <div class="footer">
    <span id="status">Type <strong>help</strong> for more commands • Scan QR to share</span>
  </div>

  <script>
    const linesContainer = document.getElementById('lines');
    let currentLine = 0;

    // === VCARD DATA ===
    const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Richard Mathy, M.Ed.
N:Mathy;Richard;;;
ORG:Station Delta
TITLE:Founder & AI Systems Architect
NOTE:UE ID: Q6HHZBDYZT54\nCLI Training for the AI Era - You can prompt. Can you ship?
URL:https://stationdelta.dev
X-SOCIALPROFILE;type=twitter:https://x.com/Richard_Mathy
END:VCARD`;

    function downloadVCard() {
      const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'RichardMathy_StationDelta.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    const script = [
      { type: 'prompt', text: 'root@stationdelta:~$ cat StationDelta.dev' },
      { type: 'output', text: '────────────────────────────────────────────────────' },
      { type: 'output', text: 'STATION DELTA — CLI Training for the AI Era' },
      { type: 'output', text: '' },
      { type: 'output', text: 'Richard Mathy, M.Ed.' },
      { type: 'output', text: 'Founder & AI Systems Architect' },
      { type: 'output', text: 'UE ID: Q6HHZBDYZT54' },
      { type: 'output', text: '' },
      { type: 'output', text: 'You can prompt. Can you ship?' },
      { type: 'output', text: '' },
      { type: 'output', text: 'Narrative-driven terminal simulations that build real skills.' },
      { type: 'output', text: 'No videos. No passive learning. You type → You ship → You graduate.' },
      { type: 'output', text: '' },
      { type: 'output', text: 'Website' },
      { type: 'output', html: '→ <a href="https://stationdelta.dev" target="_blank" class="link">https://stationdelta.dev</a>' },
      { type: 'output', text: '' },
      { type: 'output', text: 'X (Twitter)' },
      { type: 'output', html: '→ <a href="https://x.com/Richard_Mathy" target="_blank" class="link">@Richard_Mathy</a>' },
      { type: 'output', text: '' },
      { type: 'output', text: 'Save Contact' },
      { type: 'output', html: '→ <span onclick="downloadVCard()" class="link">RichardMathy_StationDelta.vcf</span> (click to download)' },
      { type: 'output', text: '' },
      { type: 'output', text: 'Try a free simulation:' },
      { type: 'output', html: '→ <a href="https://stationdelta.dev" target="_blank" class="link">Cadet / Engineer Tracks</a>' },
      { type: 'output', text: '' },
      { type: 'output', text: '13 interactive CLI sims • 4 career tracks • L.O.L.A. coaching • J.A.N.E.T. testing' },
      { type: 'output', text: '────────────────────────────────────────────────────' },
      { type: 'prompt', text: 'root@stationdelta:~$ ' }
    ];

    function typeLine(line, callback) {
      const div = document.createElement('div');
      div.className = line.type === 'prompt' ? 'prompt' : 'output';
      linesContainer.appendChild(div);

      if (line.type === 'prompt') {
        div.innerHTML = `<span>root@stationdelta:~$ </span><span id="typing"></span><span class="cursor">_</span>`;
        const typingSpan = div.querySelector('#typing');
        let i = 0;
        const interval = setInterval(() => {
          if (i < line.text.length) {
            typingSpan.textContent += line.text[i++];
          } else {
            clearInterval(interval);
            div.querySelector('.cursor').remove();
            if (callback) callback();
          }
        }, 25);
      } else {
        if (line.html) {
          div.innerHTML = line.html;
        } else {
          div.textContent = line.text;
        }
        if (callback) callback();
      }
    }

    function runScript() {
      if (currentLine < script.length) {
        typeLine(script[currentLine], () => {
          currentLine++;
          linesContainer.scrollTop = linesContainer.scrollHeight;
          setTimeout(runScript, script[currentLine-1].type === 'prompt' ? 600 : 120);
        });
      } else {
        const promptDiv = document.createElement('div');
        promptDiv.className = 'prompt';
        promptDiv.innerHTML = `<span>root@stationdelta:~$ </span><input id="cmdInput" type="text" style="background:none;border:none;color:inherit;font-family:inherit;font-size:inherit;width:100%;outline:none;">`;
        linesContainer.appendChild(promptDiv);
        const input = document.getElementById('cmdInput');
        input.focus();
        
        input.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            const cmd = input.value.trim().toLowerCase();
            input.disabled = true;
            const response = document.createElement('div');
            response.className = 'output';
            
            if (cmd === 'help') {
              response.textContent = 'Available: help, whoami, mission, clear, contact, sim, vcard';
            } else if (cmd === 'whoami') {
              response.textContent = 'Richard Mathy — turning developers into AI-era operators';
            } else if (cmd === 'mission') {
              response.textContent = 'You can prompt. Can you ship?';
            } else if (cmd === 'clear') {
              linesContainer.innerHTML = '';
              currentLine = 0;
              runScript();
              return;
            } else if (cmd === 'contact') {
              response.innerHTML = '→ DM me on X @Richard_Mathy or visit <a href="https://stationdelta.dev" class="link">stationdelta.dev</a>';
            } else if (cmd === 'sim') {
              response.innerHTML = 'Launching Cadet simulation... <a href="https://stationdelta.dev" target="_blank" class="link">Open in new tab</a>';
            } else if (cmd === 'vcard' || cmd === 'download') {
              response.textContent = 'Downloading RichardMathy_StationDelta.vcf...';
              downloadVCard();
            } else {
              response.textContent = `command not found: ${cmd} (try "help")`;
            }
            
            linesContainer.appendChild(response);
            linesContainer.scrollTop = linesContainer.scrollHeight;
            
            setTimeout(() => {
              const newPrompt = document.createElement('div');
              newPrompt.className = 'prompt';
              newPrompt.innerHTML = `<span>root@stationdelta:~$ </span><input type="text" style="background:none;border:none;color:inherit;font-family:inherit;font-size:inherit;width:100%;outline:none;">`;
              linesContainer.appendChild(newPrompt);
              newPrompt.querySelector('input').focus();
            }, 400);
          }
        });
      }
    }

    window.onload = runScript;
  </script>
</body>
</html>
