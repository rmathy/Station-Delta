<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Delta: Systems Integrity Officer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Unbounded:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   STATION DELTA: SYSTEMS INTEGRITY OFFICER v1.0
   Base: Station Delta Cadet v6 (full engine + layout)
   Accent: Systems Integrity — Rose Red (#FB7185 / #4C0519 / #0A0505)
   ═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06090d;
  --surface:#0b1018;
  --s2:#101822;
  --s3:#162030;
  --border:#1c2a3a;
  --b2:#243447;
  --b3:#2d4160;
  --text:#c4d4e0;
  --muted:#4a6275;
  --muted2:#6a8090;
  /* ACCENT: Systems Integrity — Rose Red */
  --green:#FB7185;
  --green-d:#4C0519;
  --green-bg:#0A0505;
  --blue:#3b9eff;
  --blue-d:#0c3d6e;
  --blue-bg:#030d18;
  --amber:#f59e0b;
  --amber-d:#7a4c05;
  --amber-bg:#160e02;
  --red:#ef4444;
  --red-d:#7f1d1d;
  --red-bg:#140404;
  --purple:#a78bfa;
  --purple-bg:#0c0818;
  --cyan:#22d3ee;
  --pink:#f472b6;
  --orange:#fb923c;
  --silver:#b0bec5;
  --silver-d:#455a64;
  --silver-bg:#0a0e10;
  --silver-bright:#eceff1;
  --mono:'JetBrains Mono',monospace;
  --display:'Unbounded',sans-serif;
  --janet:'Share Tech Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}

body::after{content:'';pointer-events:none;position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
  z-index:9998}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 4px var(--green)}50%{box-shadow:0 0 14px var(--green),0 0 28px rgba(251,113,133,.2)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 4px var(--amber)}50%{text-shadow:0 0 16px var(--amber),0 0 32px rgba(245,158,11,.3)}}
@keyframes janetEntry{0%{opacity:0;transform:scaleX(0)}60%{transform:scaleX(1.02)}100%{opacity:1;transform:scaleX(1)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes bossFlicker{0%,100%{opacity:1}45%{opacity:.85}50%{opacity:.4}55%{opacity:.9}}
@keyframes bossGlow{0%,100%{box-shadow:0 0 8px var(--red),0 0 20px rgba(239,68,68,.15)}50%{box-shadow:0 0 20px var(--red),0 0 50px rgba(239,68,68,.3)}}
@keyframes lolaScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── LAYOUT ── */
#shell{display:grid;grid-template-rows:48px 28px 1fr;grid-template-columns:1fr 380px;height:100vh;gap:0;overflow:hidden}

/* ── TOPBAR ── */
#topbar{
  grid-column:1/-1;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 18px;
}
#logo{font-family:var(--display);font-size:11px;font-weight:900;letter-spacing:.15em;color:var(--green);white-space:nowrap;display:flex;flex-direction:column;line-height:1.1}
#logo-sub{font-size:8px;font-weight:400;letter-spacing:.25em;color:var(--muted2);text-transform:uppercase}
#cadet-tag{font-size:11px;color:var(--muted2)}
#cadet-tag b{color:var(--blue)}

#phase-track{flex:1;display:flex;align-items:center;justify-content:center;gap:0}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--border);border:1px solid var(--b2);transition:all .3s;cursor:default;position:relative}
.pdot+.pdot{margin-left:3px}
/* Touch target expansion — accessibility requirement */
.pdot::before{content:'';position:absolute;inset:-18px;border-radius:50%}
.pdot.done{background:var(--green);border-color:var(--green)}
.pdot.active{background:var(--green);border-color:var(--green);animation:pulseGlow 2s infinite}
.pdot:hover::after{content:attr(data-tip);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--b2);color:var(--text);font-size:10px;padding:3px 7px;border-radius:var(--r4);white-space:nowrap;z-index:100;pointer-events:none}
.phase-sep{font-size:9px;color:var(--border);margin:0 5px}

#tb-right{display:flex;align-items:center;gap:6px}
.tbbtn{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:3px 10px;border-radius:var(--r4);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.04em}
.tbbtn:hover{background:var(--s3);border-color:var(--b2);color:var(--text)}
#mobile-tools-btn{
  display:none;
  align-items:center;
  justify-content:center;
  gap:6px;
  background:var(--s2);
  border:1px solid var(--b2);
  color:var(--text);
  padding:3px 10px;
  border-radius:var(--r4);
  font-family:var(--mono);
  font-size:10px;
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.04em;
}
#mobile-tools-btn:hover{background:var(--s3);border-color:var(--b3)}
/* Persistent strip toggle — lives in topbar, survives strip hidden state */
#mobile-strip-toggle-btn{
  display:none;
  align-items:center;
  justify-content:center;
  width:30px;height:30px;
  background:var(--green-bg);
  border:1px solid var(--green-d);
  color:var(--green);
  border-radius:var(--r4);
  font-size:14px;
  cursor:pointer;
  transition:all .15s;
  padding:0;
  line-height:1;
  flex-shrink:0;
}
#mobile-strip-toggle-btn:hover{background:var(--s3);border-color:var(--green)}
#mobile-strip-toggle-btn.strip-is-hidden{
  background:var(--s2);
  border-color:var(--b2);
  color:var(--muted2);
}
#sandbox-pill{background:var(--amber-bg);border:1px solid var(--amber-d);color:var(--amber);padding:2px 9px;border-radius:var(--r4);font-size:9px;letter-spacing:.1em;display:none}
#hardmode-pill{background:var(--red-bg);border:1px solid var(--red-d);color:var(--red);padding:2px 9px;border-radius:var(--r4);font-size:9px;letter-spacing:.1em;display:none}
#career-impact-btn{background:var(--s2);border:1px solid var(--green-d);color:var(--green);padding:3px 10px;border-radius:var(--r4);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;display:none}
#career-impact-btn:hover{background:var(--green-bg)}

/* ── LOLA TOPBAR TEACH STRIP ── */
#lola-strip{
  grid-column:1/-1;
  background:linear-gradient(90deg,var(--green-bg),var(--blue-bg));
  border-bottom:1px solid var(--green-d);
  display:flex;align-items:center;gap:0;
  height:28px;overflow:hidden;flex-shrink:0;
  position:relative;
}
#lola-strip-avatar{
  flex-shrink:0;
  background:var(--green-d);
  color:var(--green);
  font-size:9px;font-weight:700;letter-spacing:.1em;
  padding:0 10px;height:100%;display:flex;align-items:center;
  border-right:1px solid var(--green-d);white-space:nowrap;
}
#lola-strip-ctrls{display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0}
.strip-btn{
  background:var(--s2);border:1px solid var(--b2);color:var(--muted2);
  padding:5px 9px;border-radius:4px;cursor:pointer;font-size:10px;letter-spacing:.05em;line-height:1;
}
.strip-btn:hover{color:var(--text);border-color:var(--green-d)}
.strip-btn[aria-pressed="true"]{border-color:var(--green);color:var(--green)}
#mobile-expand-btn{display:none}
#lola-strip-scroll{
  flex:1;overflow:hidden;position:relative;height:100%;display:flex;align-items:center;
}
#lola-strip-inner{
  display:flex;align-items:center;gap:0;
  white-space:nowrap;
  will-change:transform;
}
#lola-strip-inner.scrolling{
  animation:lolaScroll 22s linear infinite;
}
#lola-strip-inner.no-scroll{
  animation:none;
  padding-left:14px;
}
@media(prefers-reduced-motion:reduce){
  #lola-strip-inner.scrolling{animation:none;padding-left:14px;}
}
.lola-strip-msg{
  font-size:11px;color:var(--cyan);
  padding:0 28px 0 0;
  display:inline-flex;align-items:center;gap:7px;
  transition:opacity .4s;
}
.lola-strip-msg .ls-tag{
  font-size:9px;text-transform:uppercase;letter-spacing:.1em;
